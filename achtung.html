<!DOCTYPE html>
<html>
<head>
<style>
body {
  text-align: center;
}
canvas {
  border:1px solid #666;
  margin-left: auto;
  margin-right: auto;
  margin-top: 40px;
}
</style>
</head>
<body>

<canvas id='c'></canvas>
<script>
c = document.getElementById('c'),
ctx = c.getContext('2d');
x = 2;
c.width = 1000;
c.height = 600;

var gLoop;
var keysDown = {};
var numPlaying = 0;
var numDead = 0;

var keyLeft = [49, 37, 90, 77];
var keyRight = [81, 40, 88, 188];

addEventListener("keydown", function (e) {
	keysDown[e.keyCode] = true;
}, false);

addEventListener("keyup", function (e) {
	delete keysDown[e.keyCode];
}, false);

var checkKeys = function () {

  for(var i = 0; i < keyLeft.length; i++) {
    if(keyLeft[i] in keysDown && (players[i].gameon && players[i].alive)) {
      players[i].angle-= 0.06;
    }
    if(keyRight[i] in keysDown && (players[i].gameon && players[i].alive)) {
      players[i].angle+=0.06;
    }
  }
}

let reset = (player) =>  {
    player.x = Math.random()*800+100;
    player.y = Math.random()*400+100;
    player.alive = true;
    player.holeTimer = Math.round(Math.random()*140+60);
    player.hole = false;
    player.angle = Math.random()*2*Math.PI;
  }

let holeControl = (player) => {
    player.holeTimer--;
    if(player.holeTimer <= 0 && player.hole === false) {
      player.hole = true;
      player.holeTimer = Math.round(Math.random()*13+5);
    }

    if(player.holeTimer <= 0 && player.hole === true) {
      player.hole = false;
      player.holeTimer = Math.round(Math.random()*140+60);
    }
}

let hasCollided = (player) => {
    if(player.x < 0 || player.x > 1000 || player.y < 0 || player.y > 800) {
      return true;
    }
    if(player.hole) {
      return false;
    }
    var xToCheck = player.x + 2*Math.cos(player.angle);
    var yToCheck = player.y + 2*Math.sin(player.angle);

    var targetPixel = ctx.getImageData(Math.round(xToCheck), Math.round(yToCheck), 1, 1);

    var r = targetPixel.data[0];
    var g = targetPixel.data[1];
    var b = targetPixel.data[2];

    if(r > 0 || g > 0 || b > 0) {
      return true;
    }
    return false;

  }

let createPlayer = (_x, _y, _color) => {
    return {
        gameon: false,
        alive: true,
        x: _x,
        y: _y,
        oldx: _x,
        oldy: _y,
        angle: Math.random()*2*Math.PI,
        color: _color,
        holeTimer: Math.round(Math.random()*140+60),
        hole: false,
        score: 0,
    };
};
var players = [];
players.push(createPlayer(200, 300, '#F00'));
players.push(createPlayer(400, 300, '#0F0'));
players.push(createPlayer(600, 300, '#88F'));
players.push(createPlayer(800, 300, '#FF0'));



var GameLoop = function() {
  ctx.fillStyle = "#000";
  ctx.fillRect(900, 0, 100, 180);
  ctx.strokeStyle = "#fff";
  ctx.strokeRect(10, 10, 890, 580);
  ctx.strokeRect(905, 10, 80, 120);

  checkKeys();

  for(var i = 0; i < players.length; i++) {
    if(!players[i].gameon) {
      continue;
    }

    if(players[i].alive && hasCollided(players[i])) {
      players[i].alive = 0;
      numDead++;
      for(var j = 0; j < players.length; j++) {
        if(players[j].gameon && players[j].alive) {
          players[j].score++;
        }
      }
    }

    if(players[i].alive) {
      holeControl(players[i]);
      players[i].oldx = players[i].x;
      players[i].oldy = players[i].y;
      players[i].x += Math.cos(players[i].angle);
      players[i].y += Math.sin(players[i].angle);
      ctx.fillStyle = players[i].color;
      ctx.beginPath();
      ctx.rect(Math.round(players[i].x), Math.round(players[i].y), 1,1);
      ctx.closePath();
      ctx.fill();

      if(players[i].hole) {
        ctx.fillStyle = "#000";
        ctx.beginPath();
        ctx.rect(Math.round(players[i].oldx), Math.round(players[i].oldy), 1,1);
        ctx.closePath();
        ctx.fill();
      }
    }

    ctx.font = '12px';

    ctx.fillStyle = players[i].color;
    ctx.fillText(players[i].score, 910, 30+30*i);
    if(numDead >= numPlaying-1 && 32 in keysDown) {
      resetPlayers();
    }
  }
  gLoop = setTimeout(GameLoop, 1000 / 60);
}

var resetPlayers = function() {
    clearScreen();
    for(var i = 0; i < players.length; i++) {
      reset(players[i]);
    }
    numDead = 0;
}

var introScreen = function() {
    numPlaying = 0;
    clearScreen();

    for(var i = 0; i < players.length; i++) {
      if(keyLeft[i] in keysDown) {
        players[i].gameon = true;
      }
      if(keyRight[i] in keysDown) {
        players[i].gameon = false;
      }
    }

    ctx.font = '20px Verdana';
    ctx.fillStyle = players[0].color;
    ctx.fillText("(1 - Q)", 20, 50);
    ctx.fillStyle = players[1].color;
    ctx.fillText("(Key left - Key down)", 20, 80);
    ctx.fillStyle = players[2].color;
    ctx.fillText("(Z - X)", 20, 110);
    ctx.fillStyle = players[3].color;
    ctx.fillText("(M - ,)", 20, 140);


    for(var i = 0; i < players.length; i++) {
      if(players[i].gameon) {
        numPlaying++;
        ctx.fillStyle = players[i].color;
        ctx.fillText("READY", 300, 50+i*30);
      }
    }

    if(numPlaying>= 2) {
      ctx.fillStyle= "#fff";
      ctx.fillText("Click SPACE to start", 390, 400);
    }

    if(32 in keysDown && numPlaying > 1) {
      clearScreen()
      GameLoop();
    } else {
      gLoop = setTimeout(introScreen, 1000 / 60);
    }

}

var clearScreen = function() {
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.rect(0, 0, 1000, 800);
  ctx.closePath();
  ctx.fill();
}

introScreen();
</script>
</body>
</html>
